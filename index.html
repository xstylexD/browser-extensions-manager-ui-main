<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Browser extensions manager UI</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Overpass:ital,wght@0,100..900;1,100..900&family=Poppins:wght@400;500;700&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="main__container">
      <div class="extensions">
        <img src="./src/img/logo.svg" alt="Logo" class="extensions__logo" />

        <button class="theme__btn">
          <img
            src="./src/img/icon-moon.svg"
            alt="Dark theme"
            class="extensions__theme-light"
          />
          <img
            src="./src/img/icon-sun.svg"
            alt="light theme"
            class="extensions__theme-dark hidden"
          />
        </button>
      </div>

      <nav class="navigations">
        <h1 class="navigations__title">Extensions List</h1>
        <ul class="navigations__wrapper">
          <li class="navigations__item navigations__item-active">All</li>
          <li class="navigations__item">Active</li>
          <li class="navigations__item">Inactive</li>
        </ul>
      </nav>

      <div class="plugins">
        <!-- <div class="plugins__item">
          <div class="plugins__wrapper">
            <img
              src="./src/img/logo-devlens.svg"
              alt="DevLens"
              class="plugins__logo"
            />
            <div class="plugins__head">
              <h2 class="plugins__title">DevLens</h2>
              <p class="plugins__descr">
                Quickly inspect page layouts and visualize element boundaries.
              </p>
            </div>
          </div>
          <div class="plugins__nav">
            <button class="plugins__remove">Remove</button>
            <label class="plugins__switch">
              <input type="checkbox" />
              <span class="plugins__slider"></span>
            </label>
          </div>
        </div> -->
      </div>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>

    <script type="module" src="main.js"></script>
  </body>
</html>
